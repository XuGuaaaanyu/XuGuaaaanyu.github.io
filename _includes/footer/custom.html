<!-- start custom footer snippets -->

<a href="/sitemap/">Sitemap</a>

<!-- Support for MatJax -->
<script defer src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"></script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script"></script>

<!-- Support for Plotly -->
<script defer src='https://cdnjs.cloudflare.com/ajax/libs/plotly.js/3.0.1/plotly.min.js'></script>

<!-- Support for Mermaid -->
<script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({startOnLoad:true, theme:'default'});
    await mermaid.run({querySelector:'code.language-mermaid'});
</script>

<!-- GoatCounter view tracking and counter display -->
{% if site.goatcounter.code != "" %}
<script data-goatcounter="https://{{ site.goatcounter.code }}.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
<script>
(function() {
  var el = document.getElementById('view-counter');
  if (!el) return;
  var code = '{{ site.goatcounter.code }}';
  var path = encodeURIComponent(window.location.pathname);
  fetch('https://' + code + '.goatcounter.com/counter/' + path + '.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      el.textContent = 'Total views: ' + data.count + ', Unique views: ' + data.count_unique;
    })
    .catch(function() { el.textContent = ''; });
})();
</script>
{% endif %}

<!-- end custom footer snippets -->
