<!-- GoatCounter view tracking and counter display -->
{% if site.goatcounter.code != "" %}
<script data-goatcounter="https://{{ site.goatcounter.code }}.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
<script>
function initVisitCounter() {
  var el = document.getElementById('view-counter');
  if (!el) return;
  el.textContent = 'Loading visits...';
  var code = '{{ site.goatcounter.code }}';
  var attempts = 0;
  var maxAttempts = 50;
  var poll = setInterval(function() {
    attempts += 1;
    if (!window.goatcounter || !window.goatcounter.get_data) {
      if (attempts >= maxAttempts) {
        clearInterval(poll);
        el.textContent = 'Visits: 0';
      }
      return;
    }

    clearInterval(poll);

    // Wait a bit so GoatCounter has time to record the current visit.
    setTimeout(function() {
      var path = window.goatcounter.get_data()['p'];
      var url = 'https://' + code + '.goatcounter.com/counter/' + encodeURIComponent(path) + '.json';
      fetch(url)
        .then(function(r) {
          if (!r.ok) throw new Error('No data');
          return r.json();
        })
        .then(function(data) {
          el.textContent = 'Visits: ' + data.count;
        })
        .catch(function(err) {
          console.error('GoatCounter view counter error:', err, url);
          el.textContent = 'Visits: 0';
        });
    }, 1500);
  }, 100);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initVisitCounter);
} else {
  initVisitCounter();
}
</script>
{% endif %}
