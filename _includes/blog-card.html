{% assign _post = include.post %}

{% comment %}
  Auto-extract preview: strip <math>, <style>, h1-h6 (with content), then all HTML tags.
{% endcomment %}
{% capture _c %}{% assign _pts = _post.content | split: '<math' %}{% for _p in _pts %}{% if forloop.first %}{{ _p }}{% else %}{{ _p | split: '</math>' | last }}{% endif %}{% endfor %}{% endcapture %}
{% capture _c %}{% assign _pts = _c | split: '<style' %}{% for _p in _pts %}{% if forloop.first %}{{ _p }}{% else %}{{ _p | split: '</style>' | last }}{% endif %}{% endfor %}{% endcapture %}
{% capture _c %}{% assign _pts = _c | split: '<h1' %}{% for _p in _pts %}{% if forloop.first %}{{ _p }}{% else %}{{ _p | split: '</h1>' | last }}{% endif %}{% endfor %}{% endcapture %}
{% capture _c %}{% assign _pts = _c | split: '<h2' %}{% for _p in _pts %}{% if forloop.first %}{{ _p }}{% else %}{{ _p | split: '</h2>' | last }}{% endif %}{% endfor %}{% endcapture %}
{% capture _c %}{% assign _pts = _c | split: '<h3' %}{% for _p in _pts %}{% if forloop.first %}{{ _p }}{% else %}{{ _p | split: '</h3>' | last }}{% endif %}{% endfor %}{% endcapture %}
{% capture _c %}{% assign _pts = _c | split: '<h4' %}{% for _p in _pts %}{% if forloop.first %}{{ _p }}{% else %}{{ _p | split: '</h4>' | last }}{% endif %}{% endfor %}{% endcapture %}
{% capture _c %}{% assign _pts = _c | split: '<h5' %}{% for _p in _pts %}{% if forloop.first %}{{ _p }}{% else %}{{ _p | split: '</h5>' | last }}{% endif %}{% endfor %}{% endcapture %}
{% capture _c %}{% assign _pts = _c | split: '<h6' %}{% for _p in _pts %}{% if forloop.first %}{{ _p }}{% else %}{{ _p | split: '</h6>' | last }}{% endif %}{% endfor %}{% endcapture %}
{% assign _preview = _c | strip_html | strip | truncate: 123 %}

{% if _post.image_dir %}
  {% assign _thumb = '/blog/' | append: _post.image_dir | append: '/image.png' %}
{% else %}
  {% assign _thumb = '/blog/' | append: _post.slug | append: '/image.png' %}
{% endif %}

<div class="blog-card">
  <div class="blog-card__image-wrap">
    <img class="blog-card__image"
         src="{{ _thumb }}"
         alt="{{ _post.title }}"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
    <div class="blog-card__image--placeholder">&#128444;</div>
  </div>
  <div class="blog-card__body">
    <a class="blog-card__title" href="{{ _post.url | relative_url }}">{{ _post.title }}</a>
    <div class="blog-card__meta">
      <span class="blog-card__date">{{ _post.date | date: "%B %-d, %Y" }}</span>
      {% for _cat in _post.categories %}
        <span class="blog-card__category">{{ _cat }}</span>
      {% endfor %}
    </div>
    <p class="blog-card__preview">{{ _preview }}</p>
  </div>
</div>
