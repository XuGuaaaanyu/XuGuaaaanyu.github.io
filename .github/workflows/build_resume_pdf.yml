name: Build Resume PDF

on:
  push:
    branches:
      - main
      - master
    paths:
      - "resume/**"
      - ".github/workflows/build_resume_pdf.yml"
  workflow_dispatch:

concurrency:
  group: build-resume-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-resume:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect LaTeX source
        id: detect_source
        run: |
          if [ -f "resume/main.tex" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No resume/main.tex found. Skipping PDF build."
          fi

      - name: Build PDF from LaTeX
        if: steps.detect_source.outputs.found == 'true'
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: resume
          root_file: main.tex

      - name: Prepare publish directory
        if: steps.detect_source.outputs.found == 'true'
        run: |
          mkdir -p resume-dist
          cp resume/main.pdf resume-dist/Resume.pdf

      - name: Publish PDF to resume-pdf branch
        if: steps.detect_source.outputs.found == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: resume-pdf
          publish_dir: ./resume-dist
          force_orphan: true
